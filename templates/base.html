<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SignTogether - Speech to Sign Converter{% endblock %}</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='asset/two-fingers.png') }}">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/responsive.css') }}">

    <!-- PWA Manifest -->
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <meta name="theme-color" content="#6366f1">

    {% block extra_css %}{% endblock %}
</head>

<body>
    <header>
        <div class="container">
            <nav>
                <a href="/" class="logo">
                    <i class="ri-hand-heart-fill" style="color: var(--secondary-color);"></i>
                    SignTogether
                </a>
                <div class="nav-links">
                    <a href="/">Home</a>
                    <a href="/converter">Speech to Sign</a>
                    <a href="/model2">Sign to Speech</a>
                    <a href="/about">About</a>
                    <a href="/team">Our Team</a>
                    <a href="/contact">Contact</a>
                    <a href="/register" class="btn btn-primary" style="padding: 0.5rem 1.5rem; color: white;">Login</a>
                </div>
            </nav>
        </div>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register("{{ url_for('static', filename='service-worker.js') }}")
                    .then(registration => {
                        console.log('ServiceWorker registration successful with scope: ', registration.scope);
                    }, err => {
                        console.log('ServiceWorker registration failed: ', err);
                    });
            });
        }
    </script>
    {% block extra_js %}{% endblock %}
</body>

</html>
