# SignTogether — Android CI/CD Pipeline
# Builds and validates the Android project on every push and pull request

name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Grant execute permission for gradlew
      run: chmod +x android-project/gradlew

    - name: Create local.properties
      run: |
        echo "sdk.dir=$ANDROID_SDK_ROOT" > android-project/local.properties
        echo "MAPS_API_KEY=CI_PLACEHOLDER_KEY" >> android-project/local.properties

    - name: Build Debug APK
      working-directory: android-project
      run: ./gradlew assembleDebug --no-daemon --stacktrace

    - name: Run Unit Tests
      working-directory: android-project
      run: ./gradlew testDebugUnitTest --no-daemon

    - name: Upload APK Artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: android-project/app/build/outputs/apk/debug/*.apk
        retention-days: 14

  lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Grant execute permission for gradlew
      run: chmod +x android-project/gradlew

    - name: Create local.properties
      run: |
        echo "sdk.dir=$ANDROID_SDK_ROOT" > android-project/local.properties
        echo "MAPS_API_KEY=CI_PLACEHOLDER_KEY" >> android-project/local.properties

    - name: Run Android Lint
      working-directory: android-project
      run: ./gradlew lintDebug --no-daemon

    - name: Upload Lint Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: lint-report
        path: android-project/app/build/reports/lint-results-debug.html
        retention-days: 7
